{% extends "base.html" %}
{% block content %}
<div class="page-header">
    <h1>Projects</h1>
</div>

<div class="project-list">
    {% for p in projects %}
    <a href="/project/{{ p.id }}" class="project-card">
        <h3>{{ p.name }}</h3>
        {% if p.description %}<p>{{ p.description }}</p>{% endif %}
        <span class="project-card-hint">Click to open board →</span>
    </a>
    {% else %}
    <div class="empty-state">
        <p>No projects yet.</p>
        <p class="empty-hint">Go to <a href="/ideas">Ideas</a> to create your first project.</p>
    </div>
    {% endfor %}
</div>
{% endblock %}
